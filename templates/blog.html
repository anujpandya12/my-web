{% extends 'base.html' %}
{% block content %}

<h1 class="text-4xl text-center mt-10">Blog</h1>

<div class="grid md:grid-cols-2 gap-6 p-10">
  {% for post in posts %}
  <div class="bg-gray-900 p-6 rounded-xl hover:scale-105 transition" data-aos="fade-up">
    <a href="/post/{{ post.id }}" class="text-2xl font-semibold">
      {{ post.title }}
    </a>
    <p class="text-gray-400 mt-2">Read more →</p>
  </div>
  {% endfor %}
</div>

{% endblock %}
